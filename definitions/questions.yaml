- answer_title: local_policies_schema
  question_text: What schema name should be used for security policies?
  answer_type: text
  is_org_scope: false
  guidance: '**What is the Policies Schema?**

    The Policies Schema is created within the Local Infrastructure Database and contains account-specific
    security objects including authentication policies, network policies, and other configurations that
    cannot be replicated.


    **Recommended Name:** `POLICIES`


    This is a straightforward, self-descriptive name that clearly communicates the schema''s purpose.
    Alternative options include:

    - `SECURITY` — Security-focused objects

    - `AUTH` — Authentication and authorization objects

    - `GOVERNANCE` — General governance objects


    **Schema Configuration:**

    This schema will be created with **Managed Access** enabled, which means:

    - Only the schema owner (typically SECURITYADMIN or ACCOUNTADMIN) can grant privileges on objects

    - Prevents "shadow" security configurations where object creators grant their own access

    - Provides centralized control over who can access security policy objects


    **Best Practice:** Use a simple, single-word name that represents the functional purpose.


    **More Information:**

    * [CREATE SCHEMA](https://docs.snowflake.com/en/sql-reference/sql/create-schema)

    * [Managed Access Schemas](https://docs.snowflake.com/en/user-guide/security-access-control-overview#managed-access-schemas)

    * [Authentication Policies](https://docs.snowflake.com/en/user-guide/authentication-policies)'
- answer_title: local_infra_database
  question_text: What name should be used for the local infrastructure database?
  answer_type: text
  is_org_scope: false
  guidance: '**What is the Local Infrastructure Database?**

    The Local Infrastructure Database is a writable database within this account that stores account-specific
    administrative and governance objects. This is separate from the replicated infrastructure database
    which is read-only.


    **Why is this needed?**

    The infrastructure database replicated from the Organization Account is **read-only**. Account-specific
    objects like authentication policies, local procedures, and account-level configurations must be created
    in a local, writable database.


    **Recommended Naming Approach:**

    Use a name that clearly identifies this as a local, account-specific infrastructure database. Follow
    the same naming pattern as your platform infrastructure database. Consider formats like:

    - `<domain>_LOCAL` — e.g., `PLAT_LOCAL`, `CDP_LOCAL`

    - `<domain>_<account>` — e.g., `PLAT_SALES`, `PLAT_DEV`

    - `LOCAL_<purpose>` — e.g., `LOCAL_INFRA`, `LOCAL_ADMIN`


    **Example:** `PLAT_LOCAL` — clearly indicates Platform team ownership and local (non-replicated) scope


    **Alternative Examples:**

    - `CDP_LOCAL` — Cloud Data Platform local objects

    - `<ACCOUNT>_INFRA` — Account-specific infrastructure (e.g., `SALES_INFRA`)

    - `LOCAL_ADMIN` — Local administration database


    **Important:** This name should be distinct from the replicated infrastructure database to avoid confusion.


    **More Information:**

    * [CREATE DATABASE](https://docs.snowflake.com/en/sql-reference/sql/create-database)

    * [Object Identifiers](https://docs.snowflake.com/en/sql-reference/identifiers)'
- answer_title: replication_schedule
  question_text: How frequently should the infrastructure database be replicated to target accounts?
  answer_type: multi-select
  is_org_scope: false
  options:
  - text: Every 10 minutes
  - text: Every 30 minutes
  - text: Every hour
  - text: Manual only
  guidance: "**What is this asking?** Choose how often Snowflake should automatically synchronize the\
    \ infrastructure database to all target accounts.  \n**Why does this matter?** More frequent replication\
    \ means changes (new tags, updated views) are available sooner in target accounts, but may have minor\
    \ cost implications.  \n**Recommendations:**  \n* **Every 10 minutes** — Best for active development,\
    \ changes propagate quickly\n* **Every 30 minutes** — Good balance for most organizations\n* **Every\
    \ hour** — Suitable for stable environments with infrequent changes\n* **Manual only** — For environments\
    \ where you want explicit control over when changes propagate\n\n**Note:** Infrastructure database\
    \ changes (new tags, views) are typically infrequent, so even hourly refresh is usually sufficient."
- answer_title: infrastructure_replication_group
  question_text: 'What name would you like to use for the infrastructure database replication group?  '
  answer_type: text
  is_org_scope: true
  guidance: "**What is this asking?** Choose a name for the REPLICATION GROUP object that will synchronize\
    \ your infrastructure database to other accounts.  \n**Why does this matter?** This name will be used\
    \ when creating secondary replication groups in target accounts. Choose something descriptive and\
    \ aligned with your naming conventions.  \n**Recommendations:**  \n* Use lowercase with underscores\
    \  \n* Include a clear identifier like infrastructure or governance  \n* Keep it concise but descriptive\
    \  \n* **Examples:**  \n* infrastructure_replication_group  \n* governance_replication_group  \n*\
    \ platform_replication_group  \n* **Default recommendation:** infrastructure_replication_group"
- answer_title: enable_org_account
