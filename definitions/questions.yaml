    \n**Recommended recipients:**\n- Team distribution list (preferred)\n- Data product owner\n- FinOps\
    \ team\n\n**Examples:**\n- `data-team@company.com`\n- `finops@company.com`\n- `john.smith@company.com`\n\
    \n**Note:** Use a distribution list rather than individual email to ensure \ncoverage during absences.\n"
- answer_title: scim_prefix
  question_text: What prefix is used for your SCIM provisioner role?
  answer_type: text
  is_org_scope: false
  guidance: "**What is this asking?**\nIf using SCIM for identity management, enter the prefix used for\
    \ the \nSCIM provisioner role.\n\n**Common SCIM prefixes:**\n- `AAD` — Microsoft Entra ID (Azure AD)\n\
    - `OKTA` — Okta\n- `PING` — PingIdentity\n\n**How this is used:**\nThe SCIM provisioner role is typically\
    \ named `<PREFIX>_PROVISIONER`.\nFor example: `AAD_PROVISIONER`, `OKTA_PROVISIONER`\n\n**Enter `NONE`\
    \ if:**\n- Not using SCIM integration\n- Managing users manually\n- Using a different identity provisioning\
    \ approach\n\n**More Information:**\n* [SCIM Provisioning](https://docs.snowflake.com/en/user-guide/scim)\n"
