# =============================================================================
# Data Product Configuration - TechCorp Finance Reporting (DEV)
# Blueprint: blueprint_2db08610
# =============================================================================

# -----------------------------------------------------------------------------
# Organization Context (inherited from Platform Foundation)
# -----------------------------------------------------------------------------
snowflake_org_name: TECHCORP
account_strategy: Multi-Account (Environment-based)
object_component_order: <domain>_<env>_<dataproduct>
governance_name: GOVERNANCE
platform_database_name: INFRA

# -----------------------------------------------------------------------------
# Target Account
# -----------------------------------------------------------------------------
target_account_name: dev
target_account_access_confirmed: Yes - I have SYSADMIN access

# -----------------------------------------------------------------------------
# Data Product Identity
# -----------------------------------------------------------------------------
data_product_name: reporting
data_product_domain: finance
data_product_environment: dev
data_product_description: Financial reporting and analytics platform providing consolidated views of revenue, expenses, and KPIs for executive dashboards and regulatory reporting

# -----------------------------------------------------------------------------
# Data Product Ownership & Cost Attribution
# -----------------------------------------------------------------------------
cost_center: CC-FIN-2026
owner_users:
- taylor.specimen@techcorp.io

# -----------------------------------------------------------------------------
# Role Structure
# -----------------------------------------------------------------------------
role_structure: Standard (Admin + Create + Read)
admin_role_granted_to: ACCOUNTADMIN
grant_account_access_roles: Yes - Grant account access roles (tasks, masking, tagging)
reader_zone_access: curated

# -----------------------------------------------------------------------------
# SCIM Configuration
# -----------------------------------------------------------------------------
scim_prefix: NONE

# -----------------------------------------------------------------------------
# Zone Configuration (data_zones)
# -----------------------------------------------------------------------------
data_zones:
- name: raw
  description: Source financial data from ERP and accounting systems
  time_travel_days: 14
- name: curated
  description: Consolidated financial statements and analytics
  time_travel_days: 14

# -----------------------------------------------------------------------------
# Schema Configuration (schema_configuration)
# -----------------------------------------------------------------------------
schema_configuration:
- zone: raw
  schemas: general_ledger, accounts_payable, accounts_receivable, budgets, payroll
- zone: curated
  schemas: financial_statements, revenue, expenses, kpis, variance_analysis

# -----------------------------------------------------------------------------
# Warehouse Configuration (warehouse_configuration)
# -----------------------------------------------------------------------------
warehouse_configuration:
- name: COMPUTE
  workload: COMPUTE
  size: SMALL
  min_cluster_count: 1
  max_cluster_count: 1
  auto_suspend_seconds: 300
  timeout_minutes: 60
  comment: General compute warehouse for finance dev workloads

# -----------------------------------------------------------------------------
# Resource Monitor Configuration
# -----------------------------------------------------------------------------
resource_monitor_credits: 300
resource_monitor_frequency: MONTHLY
notification_email: taylor.specimen@techcorp.io
